<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCGWatch</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: monospace; min-height: 100vh; }
.header { border-bottom: 1px solid #1a1a1a; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
.title { font-size: 22px; font-weight: 900; }
.title span.p { color: #FFCB05; }
.title span.m { color: #9B72CF; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00ff88; display: inline-block; margin-right: 6px; }
.btn { padding: 10px 18px; border-radius: 8px; border: none; font-family: monospace; font-size: 12px; font-weight: 700; cursor: pointer; }
.btn-start { background: #00ff88; color: #000; }
.btn-stop  { background: #ff4455; color: #fff; }
.btn-check { background: transparent; border: 1px solid #333; color: #888; padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 10px; cursor: pointer; }
.btn-buy   { background: #00ff88; color: #003; border: none; padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 10px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
.btn-add   { background: transparent; border: 1px dashed #444; color: #888; padding: 10px 14px; border-radius: 6px; font-family: monospace; font-size: 11px; cursor: pointer; }
.card { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
.card.instock { border-color: #00ff8840; box-shadow: 0 0 20px rgba(0,255,136,0.05); }
.badge { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 3px; display: inline-block; }
.badge-instock    { background: #00ff88; color: #003; }
.badge-outofstock { background: #ff4455; color: #fff; }
.badge-unknown    { background: #2a2a2a; color: #666; }
.badge-checking   { background: #f59e0b; color: #000; }
.badge-error      { background: #f97316; color: #fff; }
.badge-uncertain  { background: #6366f1; color: #fff; }
.badge-blocked    { background: #78716c; color: #fff; }
.tag-pkm { background: #FFCB05; color: #000; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 2px; }
.tag-mtg { background: #9B72CF; color: #fff; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 2px; }
.toggle  { width: 38px; height: 22px; border-radius: 11px; position: relative; cursor: pointer; flex-shrink: 0; transition: background 0.2s; }
.toggle-knob { position: absolute; top: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: left 0.15s; }
.actions { display: flex; gap: 8px; margin-top: 12px; }
.main { padding: 16px; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 16px; }
.modal { background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; width: 100%; max-width: 440px; }
.field { margin-bottom: 14px; }
.field label { color: #666; font-size: 10px; display: block; margin-bottom: 6px; letter-spacing: 0.1em; }
.field input, .field select { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px 12px; color: #fff; font-family: monospace; font-size: 13px; outline: none; }
.game-btns { display: flex; gap: 8px; }
.game-btn { flex: 1; padding: 12px; border-radius: 6px; border: 2px solid #2a2a2a; background: transparent; color: #555; font-family: monospace; font-size: 11px; font-weight: 700; cursor: pointer; }
.game-btn.active-pkm { border-color: #FFCB05; color: #FFCB05; }
.game-btn.active-mtg { border-color: #9B72CF; color: #9B72CF; }
.modal-btns { display: flex; gap: 10px; margin-top: 24px; }
.alert-log { margin-top: 24px; padding: 14px; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; }
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; max-width: 290px; }
.toast { padding: 14px 16px; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); cursor: pointer; }
.interval-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.interval-btn { padding: 6px 12px; border-radius: 5px; border: 1px solid #2a2a2a; background: transparent; color: #555; font-family: monospace; font-size: 10px; cursor: pointer; }
.interval-btn.active { background: #1a1a1a; color: #fff; border-color: #9B72CF; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes spin { to{transform:rotate(360deg)} }
.pulse { animation: pulse 1.5s infinite; }
.spin { display: inline-block; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>

<div class="toast-container" id="toasts"></div>

<div class="header">
  <div>
    <div class="title"><span class="p">TCG</span><span class="m">Watch</span></div>
    <div style="margin-top:4px;font-size:10px;color:#555;">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">CONNECTING...</span>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span id="inStockBadge" style="display:none;color:#00ff88;font-size:11px;font-weight:700;" class="pulse"></span>
    <button class="btn btn-start" id="monitorBtn" onclick="toggleMonitor()">START</button>
  </div>
</div>

<div class="main">
  <div class="toolbar">
    <span style="font-size:13px;font-weight:700;" id="watchlistLabel">WATCHLIST</span>
    <div style="display:flex;gap:8px;">
      <button class="btn-check" onclick="checkAll()">CHECK ALL</button>
      <button class="btn-add" onclick="showAddModal()">+ ADD</button>
    </div>
  </div>

  <div class="interval-bar">
    <span style="color:#555;font-size:10px;line-height:28px;">Every:</span>
    <button class="interval-btn active" onclick="setInterval_(1,this)">1m</button>
    <button class="interval-btn" onclick="setInterval_(5,this)">5m</button>
    <button class="interval-btn" onclick="setInterval_(10,this)">10m</button>
    <button class="interval-btn" onclick="setInterval_(30,this)">30m</button>
  </div>

  <div id="productList"></div>

  <div class="alert-log">
    <div style="color:#555;font-size:10px;letter-spacing:0.12em;margin-bottom:10px;font-weight:700;">ALERT LOG</div>
    <div id="alertLog" style="max-height:200px;overflow-y:auto;">
      <div style="color:#333;font-size:11px;">No alerts yet</div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-bg" id="addModal" style="display:none;">
  <div class="modal">
    <h2 style="font-size:18px;margin-bottom:20px;font-weight:800;">Add Product</h2>
    <div class="field">
      <label>PRODUCT NAME</label>
      <input type="text" id="newName" placeholder="e.g. Prismatic Evolutions ETB">
    </div>
    <div class="field">
      <label>PRODUCT URL</label>
      <input type="url" id="newUrl" placeholder="https://www.target.com/p/...">
    </div>
    <div class="field">
      <label>GAME</label>
      <div class="game-btns">
        <button class="game-btn active-pkm" id="btnPkm" onclick="selectGame('pokemon')">POKEMON</button>
        <button class="game-btn" id="btnMtg" onclick="selectGame('mtg')">MTG</button>
      </div>
    </div>
    <div class="field">
      <label>RETAILER</label>
      <select id="newRetailer">
        <option value="">Select retailer...</option>
        <option>Pokemon Center</option>
        <option>Target</option>
        <option>Walmart</option>
        <option>Best Buy</option>
        <option>GameStop</option>
        <option>Amazon</option>
        <option>TCGPlayer</option>
        <option>Card Kingdom</option>
        <option>Star City Games</option>
        <option>Channel Fireball</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn" style="flex:1;background:transparent;border:1px solid #2a2a2a;color:#666;" onclick="hideAddModal()">CANCEL</button>
      <button class="btn" style="flex:2;background:#FFCB05;color:#000;" onclick="addProduct()">ADD TO WATCHLIST</button>
    </div>
  </div>
</div>

<script>
var products = [
  { id:1, name:"Prismatic Evolutions ETB", game:"pokemon", url:"https://www.pokemoncenter.com/product/290-80506/pokemon-tcg-scarlet-violet-prismatic-evolutions-elite-trainer-box", retailer:"Pokemon Center", status:"unknown", enabled:true, lastChecked:null },
  { id:2, name:"Surging Sparks Booster Box", game:"pokemon", url:"https://www.target.com/p/pokemon-trading-card-game-surging-sparks-booster-box/-/A-93472018", retailer:"Target", status:"unknown", enabled:true, lastChecked:null },
  { id:3, name:"Bloomburrow Booster Box", game:"mtg", url:"https://www.cardkingdom.com/magic/bloomburrow/booster-boxes", retailer:"Card Kingdom", status:"unknown", enabled:true, lastChecked:null },
  { id:4, name:"Outlaws of Thunder Junction", game:"mtg", url:"https://www.tcgplayer.com/search/magic/outlaws-of-thunder-junction", retailer:"TCGPlayer", status:"unknown", enabled:false, lastChecked:null }
];

var alertLog = [];
var isMonitoring = false;
var monitorTimer = null;
var intervalMins = 1;
var selectedGame = "pokemon";

function setInterval_(mins, btn) {
  intervalMins = mins;
  document.querySelectorAll('.interval-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (isMonitoring) { clearInterval(monitorTimer); startMonitorLoop(); }
}

function toggleMonitor() {
  isMonitoring = !isMonitoring;
  var btn = document.getElementById('monitorBtn');
  if (isMonitoring) {
    btn.textContent = "STOP";
    btn.className = "btn btn-stop";
    checkAll();
    startMonitorLoop();
  } else {
    btn.textContent = "START";
    btn.className = "btn btn-start";
    clearInterval(monitorTimer);
  }
}

function startMonitorLoop() {
  monitorTimer = setInterval(function() { checkAll(); }, intervalMins * 60 * 1000);
}

function checkAll() {
  products.filter(function(p) { return p.enabled; }).forEach(function(p, i) {
    setTimeout(function() { checkProduct(p.id); }, i * 800);
  });
}

function checkProduct(id) {
  var product = products.find(function(p) { return p.id === id; });
  if (!product) return;
  product.status = "checking";
  render();

  fetch("/check", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url: product.url })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var now = new Date().toLocaleTimeString();
    if (!data.success) product.status = "error";
    else if (data.inStock === true) product.status = "instock";
    else if (data.inStock === false) product.status = "outofstock";
    else product.status = "uncertain";
    product.lastChecked = now;
    if (product.status === "instock") fireAlert(product);
    render();
  })
  .catch(function() {
    product.status = "error";
    render();
  });
}

function fireAlert(product) {
  var now = new Date().toLocaleTimeString();
  alertLog.unshift({ name: product.name, retailer: product.retailer, time: now, url: product.url, game: product.game });
  showToast(product);
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var notes = product.game === "pokemon" ? [880, 1108, 1318] : [523, 659, 784];
    notes.forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.12);
      gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i*0.12 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.25);
      osc.start(ctx.currentTime + i*0.12);
      osc.stop(ctx.currentTime + i*0.12 + 0.3);
    });
  } catch(e) {}
}

function showToast(product) {
  var container = document.getElementById('toasts');
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.background = product.game === 'pokemon' ? '#FFCB05' : '#9B72CF';
  toast.style.color = product.game === 'pokemon' ? '#000' : '#fff';
  toast.innerHTML = '<div style="font-size:11px;font-weight:700;opacity:0.7;margin-bottom:4px;">STOCK ALERT</div>' +
    '<div style="font-size:14px;font-weight:700;">' + product.name + '</div>' +
    '<div style="font-size:11px;opacity:0.8;margin-top:4px;">' + product.retailer + '</div>';
  toast.onclick = function() { container.removeChild(toast); };
  container.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) container.removeChild(toast); }, 10000);
}

function toggleProduct(id) {
  var p = products.find(function(x) { return x.id === id; });
  if (p) { p.enabled = !p.enabled; render(); }
}

function removeProduct(id) {
  products = products.filter(function(x) { return x.id !== id; });
  render();
}

function selectGame(game) {
  selectedGame = game;
  document.getElementById('btnPkm').className = 'game-btn' + (game === 'pokemon' ? ' active-pkm' : '');
  document.getElementById('btnMtg').className = 'game-btn' + (game === 'mtg' ? ' active-mtg' : '');
}

function showAddModal() { document.getElementById('addModal').style.display = 'flex'; }
function hideAddModal() { document.getElementById('addModal').style.display = 'none'; }

function addProduct() {
  var name = document.getElementById('newName').value.trim();
  var url = document.getElementById('newUrl').value.trim();
  var retailer = document.getElementById('newRetailer').value;
  if (!name || !url || !retailer) return;
  products.push({ id: Date.now(), name: name, game: selectedGame, url: url, retailer: retailer, status: 'unknown', enabled: true, lastChecked: null });
  document.getElementById('newName').value = '';
  document.getElementById('newUrl').value = '';
  document.getElementById('newRetailer').value = '';
  hideAddModal();
  render();
}

function badgeClass(status) {
  var map = { instock:'badge-instock', outofstock:'badge-outofstock', unknown:'badge-unknown', checking:'badge-checking', error:'badge-error', uncertain:'badge-uncertain', blocked:'badge-blocked' };
  return 'badge ' + (map[status] || 'badge-unknown');
}

function badgeLabel(status) {
  var map = { instock:'IN STOCK', outofstock:'OUT OF STOCK', unknown:'UNCHECKED', checking:'CHECKING...', error:'ERROR', uncertain:'UNCERTAIN', blocked:'BLOCKED' };
  return map[status] || 'UNKNOWN';
}

function render() {
  var inStockCount = products.filter(function(p) { return p.status === 'instock'; }).length;
  var badge = document.getElementById('inStockBadge');
  if (inStockCount > 0) { badge.style.display = 'inline'; badge.textContent = inStockCount + ' IN STOCK'; }
  else { badge.style.display = 'none'; }

  var list = document.getElementById('productList');
  if (products.length === 0) { list.innerHTML = '<div style="text-align:center;padding:60px 0;color:#2a2a2a;">No products - tap + ADD</div>'; return; }

  list.innerHTML = products.map(function(p) {
    var toggleBg = p.enabled ? (p.game === 'pokemon' ? '#FFCB05' : '#9B72CF') : '#222';
    var knobLeft = p.enabled ? '19px' : '3px';
    var cardClass = 'card' + (p.status === 'instock' ? ' instock' : '');
    var buyBtn = p.status === 'instock' ? '<a href="' + p.url + '" target="_blank" class="btn-buy pulse">BUY NOW</a>' : '';
    var checkLabel = p.status === 'checking' ? '<span class="spin">...</span>' : 'CHECK NOW';
    return '<div class="' + cardClass + '" style="opacity:' + (p.enabled ? '1' : '0.45') + ';">' +
      '<div style="display:flex;align-items:flex-start;gap:12px;">' +
        '<div class="toggle" style="background:' + toggleBg + ';margin-top:2px;" onclick="toggleProduct(' + p.id + ')">' +
          '<div class="toggle-knob" style="left:' + knobLeft + ';"></div>' +
        '</div>' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;">' +
            '<span class="' + (p.game === 'pokemon' ? 'tag-pkm' : 'tag-mtg') + '">' + (p.game === 'pokemon' ? 'PKM' : 'MTG') + '</span>' +
            '<span class="' + badgeClass(p.status) + '">' + badgeLabel(p.status) + '</span>' +
          '</div>' +
          '<div style="color:#e8e8e8;font-size:14px;font-weight:700;margin-bottom:4px;">' + p.name + '</div>' +
          '<div style="color:#444;font-size:11px;">' + p.retailer + (p.lastChecked ? ' | ' + p.lastChecked : '') + '</div>' +
        '</div>' +
        '<button onclick="removeProduct(' + p.id + ')" style="background:transparent;border:none;color:#333;font-size:18px;cursor:pointer;padding:0 4px;">x</button>' +
      '</div>' +
      '<div class="actions">' +
        '<button class="btn-check" onclick="checkProduct(' + p.id + ')">' + checkLabel + '</button>' +
        buyBtn +
      '</div>' +
    '</div>';
  }).join('');

  var logEl = document.getElementById('alertLog');
  if (alertLog.length === 0) { logEl.innerHTML = '<div style="color:#333;font-size:11px;">No alerts yet</div>'; return; }
  logEl.innerHTML = alertLog.slice(0, 20).map(function(a) {
    return '<a href="' + a.url + '" target="_blank" style="display:block;padding:8px 0;border-bottom:1px solid #1a1a1a;text-decoration:none;">' +
      '<div style="color:#00ff88;font-size:9px;font-weight:700;">IN STOCK</div>' +
      '<div style="color:#bbb;font-size:11px;">' + a.name + '</div>' +
      '<div style="color:#444;font-size:10px;">' + a.time + '</div>' +
    '</a>';
  }).join('');
}

// Health check
fetch("/health").then(function(r) { return r.json(); }).then(function(d) {
  if (d.status === "ok") {
    document.getElementById('statusDot').style.background = '#00ff88';
    document.getElementById('statusText').textContent = 'SERVER ONLINE';
  }
}).catch(function() {
  document.getElementById('statusDot').style.background = '#ff4455';
  document.getElementById('statusText').textContent = 'SERVER OFFLINE';
});

render();
</script>
</body>
</html>
